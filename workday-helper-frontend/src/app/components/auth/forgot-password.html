<div class="app-bg min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-sm">

    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="w-20 h-20 rounded-2xl accent-bg flex items-center justify-center mx-auto mb-4 shadow-lg">
        <span class="text-white text-2xl font-bold">W</span>
      </div>
      <h1 class="text-2xl font-bold text-gray-900 tracking-tight">Reset password</h1>
      <p class="text-sm text-gray-500 mt-1">We'll send you a reset link</p>
    </div>

    <div class="glass-card rounded-3xl p-7">

      @if (submitted) {
        <div class="text-center py-4">
          <div class="w-12 h-12 rounded-2xl bg-green-100 flex items-center justify-center mx-auto mb-4">
            <lucide-icon [img]="Send" [size]="20" class="text-green-600"></lucide-icon>
          </div>
          <p class="text-sm font-semibold text-gray-800 mb-1">Check your inbox</p>
          <p class="text-xs text-gray-500">If an account exists for <span class="font-semibold text-gray-700">{{ email }}</span>, you'll receive a reset link shortly.</p>
        </div>
      } @else {
        <form (ngSubmit)="submit()" class="space-y-4">
          <div>
            <label class="text-xs font-semibold text-gray-600 mb-1.5 block">Email address</label>
            <div class="relative">
              <div class="absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400">
                <lucide-icon [img]="Mail" [size]="15"></lucide-icon>
              </div>
              <input [(ngModel)]="email" name="email" type="email" placeholder="you@work.com" required
                class="w-full pl-10 pr-4 py-2.5 bg-white/60 border border-white/80 rounded-xl text-gray-900 placeholder-gray-400 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 transition" />
            </div>
          </div>

          <button type="submit"
            class="w-full accent-bg hover:opacity-90 text-white font-bold py-2.5 rounded-xl transition-opacity shadow-sm flex items-center justify-center gap-2 mt-2">
            <lucide-icon [img]="Send" [size]="15"></lucide-icon>
            Send reset link
          </button>
        </form>
      }

    </div>

    <p class="text-center text-xs text-gray-500 mt-5">
      <a routerLink="/login" class="accent font-bold hover:opacity-70 transition-opacity flex items-center justify-center gap-1">
        <lucide-icon [img]="ArrowLeft" [size]="12"></lucide-icon>
        Back to sign in
      </a>
    </p>

  </div>
</div>
