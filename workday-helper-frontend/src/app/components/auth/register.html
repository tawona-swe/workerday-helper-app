<div class="app-bg min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-sm">

    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="w-14 h-14 rounded-2xl accent-bg flex items-center justify-center mx-auto mb-4 shadow-lg">
        <span class="text-white text-2xl font-bold">W</span>
      </div>
      <h1 class="text-2xl font-bold text-gray-900 tracking-tight">Create account</h1>
      <p class="text-sm text-gray-500 mt-1">Start your WorkdayHelper journey</p>
    </div>

    <!-- Card -->
    <div class="glass-card rounded-3xl p-7">

      @if (error) {
        <div class="bg-red-50 border border-red-200 text-red-600 text-xs font-medium px-4 py-3 rounded-xl mb-4">
          {{ error }}
        </div>
      }

      <form (ngSubmit)="submit()" class="space-y-4">

        <!-- Name -->
        <div>
          <label class="text-xs font-semibold text-gray-600 mb-1.5 block">Full name</label>
          <div class="relative">
            <div class="absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400">
              <lucide-icon [img]="User" [size]="15"></lucide-icon>
            </div>
            <input [(ngModel)]="name" name="name" type="text" placeholder="Jane Smith" required
              class="w-full pl-10 pr-4 py-2.5 bg-white/60 border border-white/80 rounded-xl text-gray-900 placeholder-gray-400 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 transition" />
          </div>
        </div>

        <!-- Email -->
        <div>
          <label class="text-xs font-semibold text-gray-600 mb-1.5 block">Email address</label>
          <div class="relative">
            <div class="absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400">
              <lucide-icon [img]="Mail" [size]="15"></lucide-icon>
            </div>
            <input [(ngModel)]="email" name="email" type="email" placeholder="you@work.com" required
              class="w-full pl-10 pr-4 py-2.5 bg-white/60 border border-white/80 rounded-xl text-gray-900 placeholder-gray-400 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 transition" />
          </div>
        </div>

        <!-- Password -->
        <div>
          <label class="text-xs font-semibold text-gray-600 mb-1.5 block">Password</label>
          <div class="relative">
            <div class="absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400">
              <lucide-icon [img]="Lock" [size]="15"></lucide-icon>
            </div>
            <input [(ngModel)]="password" name="password" [type]="showPassword ? 'text' : 'password'" placeholder="••••••••" required
              class="w-full pl-10 pr-10 py-2.5 bg-white/60 border border-white/80 rounded-xl text-gray-900 placeholder-gray-400 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 transition" />
            <button type="button" (click)="showPassword = !showPassword"
              class="absolute right-3.5 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 transition-colors">
              <lucide-icon [img]="showPassword ? EyeOff : Eye" [size]="15"></lucide-icon>
            </button>
          </div>
        </div>

        <!-- Submit -->
        <button type="submit" [disabled]="loading"
          class="w-full accent-bg hover:opacity-90 disabled:opacity-60 text-white font-bold py-2.5 rounded-xl transition-opacity shadow-sm flex items-center justify-center gap-2 mt-2">
          @if (loading) {
            <span class="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></span>
          } @else {
            <lucide-icon [img]="UserPlus" [size]="15"></lucide-icon>
          }
          {{ loading ? 'Creating account...' : 'Create account' }}
        </button>

      </form>
    </div>

    <p class="text-center text-xs text-gray-500 mt-5">
      Already have an account?
      <a routerLink="/login" class="accent font-bold hover:opacity-70 transition-opacity">Sign in</a>
    </p>

  </div>
</div>
