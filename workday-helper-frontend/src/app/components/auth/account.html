<div class="p-6 max-w-xl mx-auto">

  <!-- Header -->
  <div class="mb-6">
    <h2 class="text-lg font-bold text-gray-900">Account Settings</h2>
    <p class="text-xs text-gray-500 mt-0.5">Manage your profile and security</p>
  </div>

  <!-- Avatar + email row -->
  <div class="glass-card rounded-2xl p-5 mb-4 flex items-center gap-4">
    <div class="w-14 h-14 rounded-2xl accent-bg flex items-center justify-center text-white text-xl font-bold flex-shrink-0">
      {{ (auth.currentUser()?.name ?? 'U')[0].toUpperCase() }}
    </div>
    <div>
      <p class="text-sm font-bold text-gray-900">{{ auth.currentUser()?.name }}</p>
      <p class="text-xs text-gray-500 flex items-center gap-1 mt-0.5">
        <lucide-icon [img]="Mail" [size]="12"></lucide-icon>
        {{ auth.currentUser()?.email }}
      </p>
    </div>
  </div>

  <!-- Edit form -->
  <div class="glass-card rounded-2xl p-5">

    @if (success) {
      <div class="bg-green-50 border border-green-200 text-green-700 text-xs font-medium px-4 py-3 rounded-xl mb-4 flex items-center gap-2">
        <lucide-icon [img]="CheckCircle" [size]="14"></lucide-icon>
        {{ success }}
      </div>
    }
    @if (error) {
      <div class="bg-red-50 border border-red-200 text-red-600 text-xs font-medium px-4 py-3 rounded-xl mb-4">
        {{ error }}
      </div>
    }

    <form (ngSubmit)="save()" class="space-y-4">

      <!-- Name -->
      <div>
        <label class="text-xs font-semibold text-gray-600 mb-1.5 block">Display name</label>
        <div class="relative">
          <div class="absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400">
            <lucide-icon [img]="User" [size]="15"></lucide-icon>
          </div>
          <input [(ngModel)]="name" name="name" type="text" placeholder="Your name"
            class="w-full pl-10 pr-4 py-2.5 bg-white/60 border border-white/80 rounded-xl text-gray-900 placeholder-gray-400 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 transition" />
        </div>
      </div>

      <!-- New password -->
      <div>
        <label class="text-xs font-semibold text-gray-600 mb-1.5 block">New password <span class="font-normal text-gray-400">(leave blank to keep current)</span></label>
        <div class="relative">
          <div class="absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400">
            <lucide-icon [img]="Lock" [size]="15"></lucide-icon>
          </div>
          <input [(ngModel)]="newPassword" name="newPassword" [type]="showPassword ? 'text' : 'password'" placeholder="••••••••"
            class="w-full pl-10 pr-10 py-2.5 bg-white/60 border border-white/80 rounded-xl text-gray-900 placeholder-gray-400 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 transition" />
          <button type="button" (click)="showPassword = !showPassword"
            class="absolute right-3.5 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 transition-colors">
            <lucide-icon [img]="showPassword ? EyeOff : Eye" [size]="15"></lucide-icon>
          </button>
        </div>
      </div>

      <button type="submit" [disabled]="loading"
        class="w-full accent-bg hover:opacity-90 disabled:opacity-60 text-white font-bold py-2.5 rounded-xl transition-opacity shadow-sm flex items-center justify-center gap-2">
        @if (loading) {
          <span class="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></span>
        } @else {
          <lucide-icon [img]="Save" [size]="15"></lucide-icon>
        }
        {{ loading ? 'Saving...' : 'Save changes' }}
      </button>

    </form>
  </div>

</div>
