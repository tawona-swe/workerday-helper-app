spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

app.jwt.secret=test-secret-key-for-testing-purposes-only-256bits
app.jwt.expiration-ms=86400000

app.llm.api-key=test-key
app.llm.base-url=https://api.groq.com/openai/v1
app.llm.model=llama-3.1-8b-instant

google.client.id=test-client-id
google.client.secret=test-client-secret
google.redirect.uri=http://localhost:8080/api/calendar/callback
