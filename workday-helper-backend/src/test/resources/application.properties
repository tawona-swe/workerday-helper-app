# Test configuration — use in-memory H2 to avoid conflicts with persistent dev DB
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

spring.h2.console.enabled=false
spring.sql.init.mode=never

app.jwt.secret=workday-helper-super-secret-key-change-in-production-must-be-256-bits
app.jwt.expiration-ms=86400000

app.llm.api-key=test-api-key
app.llm.base-url=https://api.openai.com
