spring.application.name=workday-helper

# H2 file-based persistent database
spring.datasource.url=jdbc:h2:file:./data/workdaydb;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT
app.jwt.secret=workday-helper-super-secret-key-change-in-production-must-be-256-bits
app.jwt.expiration-ms=86400000

spring.jpa.open-in-view=false
