spring.application.name=workday-helper

# H2 file-based persistent database
spring.datasource.url=jdbc:h2:file:./data/workdaydb;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

spring.jpa.open-in-view=false

# LLM (OpenAI-compatible — Groq, Gemini, etc.)
app.llm.api-key=${LLM_API_KEY:${GROQ_API_KEY:${GEMINI_API_KEY:changeme}}}
app.llm.base-url=${LLM_BASE_URL:https://api.groq.com/openai/v1}
app.llm.model=${LLM_MODEL:llama-3.1-8b-instant}

# Google Calendar OAuth
google.client.id=${GOOGLE_CLIENT_ID}
google.client.secret=${GOOGLE_CLIENT_SECRET}
google.redirect.uri=${GOOGLE_REDIRECT_URI:https://workday.tawonarwatida.co.zw/api/calendar/callback}
